services:
  pulseguard:
    environment:
      - PULSEGUARD_RELAY_ENABLED=true
      - PULSEGUARD_RELAY_PUBLIC_HOST=${PULSEGUARD_RELAY_PUBLIC_HOST:-127.0.0.1}
      - PULSEGUARD_RELAY_PUBLIC_PORT=${PULSEGUARD_RELAY_PUBLIC_PORT:-9443}
      - PULSEGUARD_RELAY_INTERNAL_HOST=${PULSEGUARD_RELAY_INTERNAL_HOST:-pulseguard-relay-internal}
      - PULSEGUARD_RELAY_CONTROL_URL=http://${PULSEGUARD_RELAY_INTERNAL_HOST:-pulseguard-relay-internal}:${PULSEGUARD_RELAY_CONTROL_PORT:-18000}
    networks:
      default: {}
      pulseguard-relay-internal: {}

  pulseguard-relay:
    build: .
    container_name: pulseguard-relay
    restart: unless-stopped
    command: ["python", "-m", "app.relay_server"]
    ports:
      - "${PULSEGUARD_RELAY_PUBLISH_HOST:-0.0.0.0}:${PULSEGUARD_RELAY_PUBLIC_PORT:-9443}:${PULSEGUARD_RELAY_PUBLIC_PORT:-9443}"
    expose:
      - "${PULSEGUARD_RELAY_CONTROL_PORT:-18000}"
    networks:
      default: {}
      pulseguard-relay-internal:
        aliases:
          - pulseguard-relay-internal
    volumes:
      - ./data:/app/data
    environment:
      - TZ=${TZ:-Asia/Shanghai}
      - PULSEGUARD_RELAY_ENABLED=true
      - PULSEGUARD_RELAY_PUBLIC_HOST=${PULSEGUARD_RELAY_PUBLIC_HOST:-127.0.0.1}
      - PULSEGUARD_RELAY_PUBLIC_PORT=${PULSEGUARD_RELAY_PUBLIC_PORT:-9443}
      - PULSEGUARD_RELAY_INTERNAL_LISTEN_HOST=${PULSEGUARD_RELAY_INTERNAL_LISTEN_HOST:-pulseguard-relay-internal}
      - PULSEGUARD_RELAY_INTERNAL_PORT_START=${PULSEGUARD_RELAY_INTERNAL_PORT_START:-18001}
      - PULSEGUARD_RELAY_INTERNAL_PORT_END=${PULSEGUARD_RELAY_INTERNAL_PORT_END:-18100}
      - PULSEGUARD_RELAY_MAX_CONCURRENT_STREAMS=${PULSEGUARD_RELAY_MAX_CONCURRENT_STREAMS:-2}
      - PULSEGUARD_RELAY_STREAM_IDLE_TIMEOUT_SECONDS=${PULSEGUARD_RELAY_STREAM_IDLE_TIMEOUT_SECONDS:-900}
      - PULSEGUARD_RELAY_PORT_QUARANTINE_SECONDS=${PULSEGUARD_RELAY_PORT_QUARANTINE_SECONDS:-960}
      - PULSEGUARD_RELAY_MAX_PUBLIC_CONNECTIONS=${PULSEGUARD_RELAY_MAX_PUBLIC_CONNECTIONS:-256}
      - PULSEGUARD_RELAY_HELLO_TIMEOUT_SECONDS=${PULSEGUARD_RELAY_HELLO_TIMEOUT_SECONDS:-10}
      - PULSEGUARD_RELAY_MAX_FRAME_BYTES=${PULSEGUARD_RELAY_MAX_FRAME_BYTES:-1048576}
      - PULSEGUARD_RELAY_AUTH_BACKOFF_BASE_SECONDS=${PULSEGUARD_RELAY_AUTH_BACKOFF_BASE_SECONDS:-0.25}
      - PULSEGUARD_RELAY_AUTH_BACKOFF_MAX_SECONDS=${PULSEGUARD_RELAY_AUTH_BACKOFF_MAX_SECONDS:-5}
      - PULSEGUARD_RELAY_CONTROL_HOST=0.0.0.0
      - PULSEGUARD_RELAY_CONTROL_PORT=${PULSEGUARD_RELAY_CONTROL_PORT:-18000}
      - PULSEGUARD_DATA_DIR=/app/data
    mem_limit: 512m
    cpus: 0.5

networks:
  pulseguard-relay-internal:
    internal: true
