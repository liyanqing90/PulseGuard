<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">PulseGuard brand card</title>
  <desc id="desc">PulseGuard brand lockup for a local and LAN UI/API probe console.</desc>
  <rect width="1200" height="360" rx="28" fill="#f4f6f8"/>
  <rect x="32" y="32" width="1136" height="296" rx="20" fill="#fbfcfd" stroke="#d8dee4"/>
  <g transform="translate(82 84)">
    <rect x="0" y="0" width="128" height="128" rx="28" fill="#fbfcfd" stroke="#d8dee4" stroke-width="2"/>
    <rect x="14" y="14" width="100" height="100" rx="22" fill="#f4f6f8" stroke="#2563eb" stroke-width="7"/>
    <path d="M28 70h18l10-32 18 64 13-44 7 18h18" fill="none" stroke="#2563eb" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="m84 91 8 8 17-20" fill="none" stroke="#16833a" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <g fill="#1f2328" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, PingFang SC, Microsoft YaHei UI, system-ui, sans-serif">
    <text x="250" y="128" font-size="48" font-weight="700">PulseGuard</text>
    <text x="250" y="172" font-size="24" font-weight="500" fill="#656d76">Local and LAN UI/API probe console</text>
    <text x="250" y="222" font-size="18" font-weight="500" fill="#656d76">Keep screenshots, Trace, responses, and run history.</text>
  </g>
  <g font-family="-apple-system, BlinkMacSystemFont, Segoe UI, PingFang SC, Microsoft YaHei UI, system-ui, sans-serif" font-size="16" font-weight="600">
    <rect x="250" y="252" width="110" height="34" rx="8" fill="#eaf2ff" stroke="#d8dee4"/>
    <text x="268" y="274" fill="#1d4ed8">UI probes</text>
    <rect x="378" y="252" width="118" height="34" rx="8" fill="#eaf2ff" stroke="#d8dee4"/>
    <text x="396" y="274" fill="#1d4ed8">API probes</text>
    <rect x="514" y="252" width="166" height="34" rx="8" fill="#dafbe1" stroke="#d8dee4"/>
    <text x="532" y="274" fill="#16833a">Failure evidence</text>
    <rect x="698" y="252" width="124" height="34" rx="8" fill="#f1f4f7" stroke="#d8dee4"/>
    <text x="716" y="274" fill="#656d76">CLI / CI</text>
  </g>
  <g transform="translate(880 94)">
    <rect x="0" y="0" width="210" height="150" rx="14" fill="#f6f8fa" stroke="#d8dee4"/>
    <rect x="18" y="20" width="58" height="12" rx="6" fill="#2563eb"/>
    <rect x="18" y="50" width="174" height="12" rx="6" fill="#d8dee4"/>
    <rect x="18" y="78" width="116" height="12" rx="6" fill="#dafbe1"/>
    <rect x="18" y="106" width="148" height="12" rx="6" fill="#d8dee4"/>
    <circle cx="178" cy="28" r="8" fill="#16833a"/>
  </g>
</svg>
