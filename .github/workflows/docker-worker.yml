name: Docker Worker Image

on:
  push:
    branches:
      - main
      - "codex/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-worker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: image
        shell: bash
        run: |
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          ref="$(echo "${GITHUB_REF_NAME}" | tr '[:upper:]' '[:lower:]')"
          tag="$(echo "${ref}" | sed -E 's/[^a-z0-9_.-]+/-/g')"
          worker_image="ghcr.io/${owner}/pulseguard-worker"
          updater_image="ghcr.io/${owner}/pulseguard-worker-updater"
          {
            echo "worker_tags<<EOF"
            echo "${worker_image}:${tag}"
            if [ "${GITHUB_REF_NAME}" = "main" ]; then
              echo "${worker_image}:latest"
            fi
            echo "EOF"
            echo "updater_tags<<EOF"
            echo "${updater_image}:${tag}"
            if [ "${GITHUB_REF_NAME}" = "main" ]; then
              echo "${updater_image}:latest"
            fi
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Build and push worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.worker
          push: true
          tags: ${{ steps.image.outputs.worker_tags }}
          build-args: |
            PULSEGUARD_BUILD_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push updater image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.worker-updater
          push: true
          tags: ${{ steps.image.outputs.updater_tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
